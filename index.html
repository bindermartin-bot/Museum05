      <param name="A_07" value="id='TEXT' matriz='sí' evaluar='una-sola-vez' columnas='4' filas='17' expresión='TEXT[0,0]=&squot;Figurenzahlen oder auch Polygonzahlen sind Zahlen,\ndie sich in Form von überlappenden Polygonen\n(Vielecken) legen lassen.\nProbieren Sie es aus: Verändern sie die Anzahl\nEcken oder die Anzahl Vielecke.&squot;;TEXT[0,1]=&squot;Dreieckszahlen sind Zahlen die sich in Form eines Dreiecks anordnen lassen.\nSie ergeben sich daher als Summe aufsteigender Zahlen.&squot;;TEXT[1,0]=&squot;Wenn Sie die 100. Dreieckszahl berechnen müssten:&squot;;TEXT[1,1]=&squot;Diese Summe ist zu berechnen:&squot;;TEXT[1,2]=&squot;&squot;;TEXT[1,3]=&squot;Mit welcher Formel berechnen Sie die Summe&squot;;TEXT[1,4]=TEXT[1,2];TEXT[1,5]=&squot;Genauso geht dies mit der 100. Dreieckszahl. Zuerst eine Kopie: \${D_{100}}&squot;;TEXT[1,6]=&squot;Mit welcher Formel berechnen Sie die Summe&squot;;TEXT[1,7]=&squot;&squot;;TEXT[1,8]=&squot;Richtig!\n\nSie sollen das Resultat von\n\n\n\nberechnen.&squot;;TEXT[1,9]=&squot;Folgende Zahl soll berechnet werden:&squot;;TEXT[1,10]=&squot;&squot;;TEXT[1,11]=&squot;Betrachten Sie die Bilderfolge genau&squot;;TEXT[1,12]=&squot;Betrachten Sie die Bilderfolge genau&squot;;TEXT[1,13]=&squot;Betrachten Sie die Bilderfolge genau&squot;;TEXT[1,14]=&squot;Wie gross ist die folgende Summe?&squot;;TEXT[1,15]=&squot;Das Resultat [answ2] ist falsch!&squot;;TEXT[1,16]=&squot;Sie haben es geschafft!&squot;;TEXT[2,0]=&squot;&squot;;TEXT[2,1]=&squot;\nRunde [runde]:\nBerechnen Sie \${D_{[spielZahl]}} = 1 + 2 + ... + [spielZahl-1] + [spielZahl].\n\nBenutzen Sie zur Eingabe den Taschenrechner.\nBestätigen Sie Ihre Antwort mit der Taste Fertig.\n\nSie können auch einen Hinweis verwenden.\nEine falsche Antwort oder ein Hinweis\nhalbieren jedoch die Punkte, die zu holen sind.\n&squot;;TEXT[2,2]=&squot;\nRunde [runde]:\nBerechnen Sie die Summe der aufeinanderfolgenden\nDreieckszahlen \${D_{[spielZahl]}+D_{[spielZahl-1]}}.\n\nBeachten Sie die geometrische Darstellung rechts.&squot;;TEXT[2,3]=&squot;\nRunde [runde]:\nAn einem Schachturnier nehmen [spielZahl] Personen teil\nJede spielt gegen jede andere genau einmal\n(wer mit weiss beginnt, wird jeweils ausgelost).\n\nWie viele Partien gibt es insgesamt?&squot;;TEXT[2,4]=&squot;\nRunde [runde]:\nAn einem Schachturnier nehmen [spielZahl] Personen teil\nJede spielt gegen jede andere genau zwei Mal\n(jeder beginnt einmal mit weiss und einmal mit Schwarz).\n\nWie viele Partien gibt es insgesamt?&squot;;TEXT[2,5]=&squot;\nRunde [runde]:\nNun werden nur die geraden Zahlen addiert.\n\nWie viel ergibt 2 + 4 + 6 + ... + [(spielZahl-1)*2] + [spielZahl*2]}?&squot;;TEXT[2,6]=&squot;\nRunde [runde]:\nNun werden nur die ungeraden Zahlen addiert.\n\nWie viel ergibt 1 + 3 + 5 + ... + [(spielZahl-1)*2-1] + [spielZahl*2-1]}?&squot;;TEXT[2,7]=&squot;\nRunde [runde]:\nRechts sehen Sie ein regelmässiges [spielZahl]-Eck.\n\nWie viele Seiten und Diagonalen hat dieses?&squot;;TEXT[2,8]=&squot;\nRunde [runde]:\nRechts sehen Sie ein regelmässiges [spielZahl]-Eck.\n\nWie viele Diagonalen (ohne die Seiten zu zählen) hat dieses?&squot;;TEXT[2,9]=&squot;\nRunde [runde]:\nIn einem Dominospiel gibt es Steine, in denen jeweils\nzwei Zahlen von 0 bis zu [spielZahl] dargestellt werden durch &quot;Augen&quot;.\nIn einem kompletten Dominoset bis zu maximal [spielZahl] Augen\nkommt jede mögliche Kombination genau ein Mal vor.\n\nWie viele Steine hat ein solches Set?&squot;;TEXT[2,10]=&squot;&squot;' tipo='matriz' ">

      <param name="G_36" value="espacio='E1' tipo='texto' color='20303a' dibujar-si='(np==3)&(subnp==2)' coord_abs='sí' expresión='(40*MSK,40*MSK)' texto='{\rtf1\uc0{\fonttbl\f0\fcharset0 Arial;}\f0\fs44 Nicht im konkreten Berechnen einer Summe oder eines Produkts findet die Mathematik\par\f0\fs44 so wesentlich statt, wie im Erkennen, wie die Summe oder das Produkt durch\par\f0\fs44 Überlegung schnell und effizient berechnet werden kann, oder welche Zusammenhänge\par\f0\fs44 es zwischen verschiedenen Summen im Allgemeinen gibt.\par\f0\fs44 }' ancho='1' fuente puntos='24' align='a_left' anchor='a_top_left' info='Erklaerung_Mathematik 3' ">
